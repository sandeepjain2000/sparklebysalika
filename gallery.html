<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — SparklebySalika</title>
  <meta name="description" content="Category gallery from SparklebySalika." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ivory: #faf8f5;
      --cream: #f7f3ec;
      --cream-deep: #efe8dc;
      --ink: #121212;
      --ink-soft: #5c564e;
      --gold: #b8956c;
      --gold-deep: #8c6d45;
      --white: #fffcf8;
      --shadow: 0 18px 50px rgba(18, 18, 18, 0.08);
      --font-display: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      --font-body: "Inter", system-ui, -apple-system, sans-serif;
      --font-ui: "Manrope", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      color: var(--ink);
      background: var(--ivory);
      line-height: 1.7;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a { color: inherit; text-decoration: none; }

    /* Wide oval mask — less cropping than a narrow circle */
    .grid figure {
      position: relative;
      display: block;
      width: 100%;
      max-width: 340px;
      height: 0 !important;
      padding: 0 0 72% 0 !important;
      margin-inline: auto;
      border-radius: 50% !important;
      overflow: hidden !important;
      background: var(--cream-deep);
      box-shadow: var(--shadow);
      border: 1px solid rgba(184, 149, 108, 0.22);
    }

    .grid figure img {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      object-fit: cover !important;
      object-position: center 30% !important;
      border-radius: 50% !important;
    }

    .wrap { width: min(1100px, calc(100% - 2.5rem)); margin-inline: auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(250, 248, 245, 0.9);
      border-bottom: 1px solid rgba(184, 149, 108, 0.18);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 4.25rem;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .logo span { color: var(--gold-deep); font-weight: 400; }

    .back {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .back:hover { color: var(--ink); }

    .hero {
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid rgba(28, 24, 20, 0.08);
      margin-bottom: 2rem;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.7rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 400;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      padding-bottom: 4rem;
    }

    .grid figure img {
      transition: transform 0.6s ease;
    }

    .grid figure:hover img {
      transform: scale(1.05);
    }

    .empty {
      padding: 3rem 0 5rem;
      color: var(--ink-soft);
    }

    .empty a {
      color: var(--ink);
      border-bottom: 1px solid var(--gold);
    }

    footer {
      border-top: 1px solid rgba(184, 149, 108, 0.22);
      padding: 1.5rem 0 2rem;
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .social-links {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .social-icon {
      display: grid;
      place-items: center;
      width: 2.25rem;
      height: 2.25rem;
      color: var(--ink-soft);
      border: 1px solid rgba(184, 149, 108, 0.35);
      border-radius: 50%;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .social-icon:hover {
      color: var(--ink);
      border-color: var(--gold-deep);
      background: rgba(184, 149, 108, 0.08);
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a class="logo" href="index.html">Sparkleby<span>Salika</span></a>
      <a class="back" href="index.html#highlights">← All highlights</a>
    </div>
  </header>

  <main class="wrap">
    <div class="hero">
      <p class="eyebrow">Category gallery</p>
      <h1 id="title">Gallery</h1>
    </div>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" hidden>
      Images for this category are still being added.
      <a href="index.html#highlights">Back to highlights</a>
    </p>
  </main>

  <footer>
    <div class="wrap footer-inner">
      <p>© <span id="year"></span> SparklebySalika</p>
      <div class="social-links">
        <a
          class="social-icon"
          href="https://www.instagram.com/sparklebysalika/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="SparklebySalika on Instagram"
          title="Instagram"
        >
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="3" width="18" height="18" rx="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
          </svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="categories.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const params = new URLSearchParams(location.search);
    const slug = params.get("cat") || "";
    const cat = (window.CATEGORIES || []).find((c) => c.slug === slug);

    const titleEl = document.getElementById("title");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");

    if (!cat) {
      titleEl.textContent = "Category not found";
      empty.hidden = false;
    } else {
      titleEl.textContent = cat.label;
      document.title = `${cat.label} — SparklebySalika`;

      let loaded = 0;
      const names = cat.files || Array.from(
        { length: cat.count || 5 },
        (_, i) => String(i + 1).padStart(3, "0")
      );

      names.forEach((name, i) => {
        const src = `images/${cat.slug}/${name}.jpg`;
        const figure = document.createElement("figure");
        const img = document.createElement("img");
        img.src = src;
        img.alt = `${cat.label} ${i + 1}`;
        img.loading = "lazy";
        img.onerror = () => {
          figure.remove();
          if (grid.children.length === 0) empty.hidden = false;
        };
        img.onload = () => {
          loaded += 1;
        };
        figure.appendChild(img);
        grid.appendChild(figure);
      });

      // If all fail quickly, show empty state after a beat
      setTimeout(() => {
        if (grid.querySelectorAll("img").length === 0 ||
            [...grid.querySelectorAll("img")].every((img) => !img.complete || img.naturalWidth === 0)) {
          // keep figures that loaded; if none remain, empty shows via onerror
          if (!grid.children.length) empty.hidden = false;
        }
      }, 800);
    }
  </script>
</body>
</html>
