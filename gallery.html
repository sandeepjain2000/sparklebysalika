<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — SparklebySalika</title>
  <meta name="description" content="Category gallery from SparklebySalika." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f6f0e8;
      --cream-deep: #ebe2d4;
      --ink: #1c1814;
      --ink-soft: #4a423a;
      --gold: #b8924a;
      --white: #fffcf8;
      --shadow: 0 24px 60px rgba(28, 24, 20, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      font-weight: 300;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.6;
    }

    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    a { color: inherit; text-decoration: none; }

    .wrap { width: min(1100px, calc(100% - 2.5rem)); margin-inline: auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(246, 240, 232, 0.9);
      border-bottom: 1px solid rgba(28, 24, 20, 0.06);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 4.25rem;
    }

    .logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .logo span { color: var(--gold); }

    .back {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .back:hover { color: var(--ink); }

    .hero {
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid rgba(28, 24, 20, 0.08);
      margin-bottom: 2rem;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.7rem;
    }

    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 400;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      padding-bottom: 4rem;
    }

    .grid figure {
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: var(--cream-deep);
      box-shadow: var(--shadow);
    }

    .grid figure img {
      transition: transform 0.6s ease;
    }

    .grid figure:hover img {
      transform: scale(1.05);
    }

    .empty {
      padding: 3rem 0 5rem;
      color: var(--ink-soft);
    }

    .empty a {
      color: var(--ink);
      border-bottom: 1px solid var(--gold);
    }

    footer {
      border-top: 1px solid rgba(28, 24, 20, 0.08);
      padding: 1.5rem 0 2rem;
      font-size: 0.82rem;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a class="logo" href="index.html">Sparkleby<span>Salika</span></a>
      <a class="back" href="index.html#highlights">← All highlights</a>
    </div>
  </header>

  <main class="wrap">
    <div class="hero">
      <p class="eyebrow">Category gallery</p>
      <h1 id="title">Gallery</h1>
    </div>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" hidden>
      Images for this category are still being added.
      <a href="index.html#highlights">Back to highlights</a>
    </p>
  </main>

  <footer>
    <div class="wrap">© <span id="year"></span> SparklebySalika</div>
  </footer>

  <script src="categories.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const params = new URLSearchParams(location.search);
    const slug = params.get("cat") || "";
    const cat = (window.CATEGORIES || []).find((c) => c.slug === slug);

    const titleEl = document.getElementById("title");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");

    if (!cat) {
      titleEl.textContent = "Category not found";
      empty.hidden = false;
    } else {
      titleEl.textContent = cat.label;
      document.title = `${cat.label} — SparklebySalika`;

      let loaded = 0;
      const total = 5;

      for (let i = 1; i <= total; i++) {
        const src = `images/${cat.slug}/${String(i).padStart(3, "0")}.jpg`;
        const figure = document.createElement("figure");
        const img = document.createElement("img");
        img.src = src;
        img.alt = `${cat.label} ${i}`;
        img.loading = "lazy";
        img.onerror = () => {
          figure.remove();
          if (--loaded <= 0 && grid.children.length === 0) {
            empty.hidden = false;
          }
        };
        img.onload = () => {
          loaded += 1;
        };
        figure.appendChild(img);
        grid.appendChild(figure);
      }

      // If all fail quickly, show empty state after a beat
      setTimeout(() => {
        if (grid.querySelectorAll("img").length === 0 ||
            [...grid.querySelectorAll("img")].every((img) => !img.complete || img.naturalWidth === 0)) {
          // keep figures that loaded; if none remain, empty shows via onerror
          if (!grid.children.length) empty.hidden = false;
        }
      }, 800);
    }
  </script>
</body>
</html>
